<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/logo.svg" />
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/output.css">
    <title>Travel Roam Partners</title>
</head>

<body>
    <div id="loadingOverlay" class="fixed inset-0 bg-white flex justify-center items-center z-[9999]">
        <div class="w-16 h-16 border-6 border-gray-200 border-t-[var(--is-blue)] rounded-full animate-spin"></div>
    </div>
    <div id="app" style="display: none;">
        <!-- start navbar -->
        <coop-navbar></coop-navbar>
        <!-- end navbar -->
        <!-- start login -->
        <section class="top-0 left-0 pt-30 pb-10 absolute bg-cover
    bg-center
    bg-no-repeat bg-[url('../images/bg-login.png')] w-full h-auto min-h-full">
            <div class="w-full flex justify-center items-center">
                <div
                    class="flex flex-col gap-[23px] text-white rounded-[15px] bg-[var(--is-blue-8)] px-10 md:px-20 py-5 w-[90%] lg:w-[45%]">
                    <img src="../assets/icons/logo.svg" alt="logo" class="w-60 h-20" />
                    <div class="flex gap-3">
                        <a href="login.html"
                            class="text-nowrap text-center hover:before:bg-[var(--is-blue)] bg-[var(--is-pink)] text-white px-3 py-[2%] rounded-[8px] btn">
                            <div class="relative z-1 text-sm font-semibold">
                                <span>Login</span>
                            </div>
                        </a>
                        <a href="register.html"
                            class="text-nowrap text-center hover:before:bg-[var(--is-blue)] border-2 border-white text-white px-3 py-[2%] rounded-[8px] btn">
                            <div class="relative z-1 text-sm font-semibold">
                                <span>Sign up</span>
                            </div>
                        </a>
                    </div>
                    <div class="flex flex-col gap-2">
                        <h2 class="font-semibold text-xl md:text-3xl">Reset your password</h2>
                        <p class="font-normal text-base">We will send you an email to reset your password.</p>
                    </div>
                    <form id="loginForm" action="register.html" method="get" class="flex flex-col gap-4">

                        <input type="email"
                            class="input-autofill border-1 border-white px-[15px] py-2 w-full placeholder:text-white bg-[var(--is-gray-16)] rounded-[10px]"
                            placeholder="Email address" />

                        <div class="my-5 flex justify-center">
                            <button type="submit"
                                class="text-center hover:before:bg-[var(--is-blue)] bg-[var(--is-pink)] text-white rounded-[15px] px-15 py-[15px] btn">
                                <div class="relative z-1 text-sm font-semibold">
                                    <span>Submit</span>
                                </div>
                            </button>
                        </div>

                        <div class="font-normal text-md flex flex-col gap-5 text-center">
                            <p>If you have just purchased an eSIM and not signed in yet please create an account.</p>
                            <p><a title="Create an account" href="register.html" class="text-[var(--is-pink)]">Create an
                                    account</a> using the
                                email used to
                                purchase your eSIM to view your usage.</p>
                        </div>

                    </form>
                </div>
            </div>
        </section>
        <!-- end login -->
    </div>
</body>

<script src="../assets/js/jquery.min.js"></script>
<script src="../assets/js/navbar-layout.js"></script>
<script src="../assets/js/footer-layout.js"></script>
<script src="../assets/js/global.js"></script>
<script src="../assets/js/loginAndRegister.js"></script>

</html>
