<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/logo.svg" />
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/output.css">
    <title>Travel Roam Partners</title>
</head>

<body>
    <div id="loadingOverlay" class="fixed inset-0 bg-white flex justify-center items-center z-[9999]">
        <div class="w-16 h-16 border-6 border-gray-200 border-t-[var(--is-blue)] rounded-full animate-spin"></div>
    </div>
    <div id="app" style="display: none;">
        <!-- start register -->
        <section class="bg-cover
    bg-center
    bg-no-repeat bg-[url('/assets/images/bg-login.png')] w-full h-screen py-10">
            <div class="w-full h-full flex justify-center items-center">
                <div
                    class="flex flex-col text-center items-center gap-[23px] rounded-[15px] bg-[var(--is-blue-8)] px-10 md:px-20 py-5">
                    <div class="flex justify-center">
                        <img src="../assets/icons/logo.svg" alt="logo" class="w-60 h-20" />
                    </div>
                    <div class="w-[790px] flex flex-col gap-[23px]">
                        <div class="text-white flex flex-col gap-4">
                            <h2 class="font-semibold text-xl md:text-3xl">Hey customer, welcome to TravelRoam</h2>
                            <p class="font-normal text-base"><span class="font-bold">TravelRoam</span> is pleased to be
                                able to offer you an exclusive
                                internet plan for your next trip. No high roaming costs, and no catches.</p>
                            <p class="font-normal text-base">To find out what your FREE plan is simply let us know your
                                promotional code below.</p>
                        </div>
                        <div class="bg-white py-[70px] px-[160px] flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <img src="../../assets/icons/usa.svg" alt="search"
                                    class="w-[39px] h-[39px] object-cover rounded-full" />
                                <p class="text-[var(--is-blue-3)] text-lg font-bold">United States</p>
                            </div>
                            <p>test</p>
                            <p>test</p>
                        </div>
                        <div>
                            <button
                                class="text-center hover:before:bg-[var(--is-blue)] bg-[var(--is-pink)] text-white rounded-[15px] px-9 py-[2%] btn">
                                <div class="relative z-1 text-sm font-semibold">
                                    <span>Redeem FREE plan</span>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- end register -->
    </div>
</body>

<script src="../assets/js/jquery.min.js"></script>
<script src="../assets/js/navbar-layout.js"></script>
<script src="../assets/js/footer-layout.js"></script>
<script src="../assets/js/global.js"></script>

</html>
