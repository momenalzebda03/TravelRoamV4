<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/logo.svg" />
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/output.css">
    <title>Travel Roam Partners</title>
</head>

<body>
    <div id="loadingOverlay" class="fixed inset-0 bg-white flex justify-center items-center z-[9999]">
        <div class="w-16 h-16 border-6 border-gray-200 border-t-[var(--is-blue)] rounded-full animate-spin"></div>
    </div>
    <div id="app" style="display: none;">
        <!-- start navbar -->
        <coop-navbar></coop-navbar>
        <!-- end navbar -->
        <!-- start login -->
        <section class="top-0 left-0 pt-40 absolute bg-cover
    bg-center
    bg-no-repeat bg-[url('/assets/images/bg-login.png')] w-full py-10">
            <div class="w-full h-full flex justify-center items-center">
                <div
                    class="flex flex-col gap-[23px] text-white rounded-[15px] bg-[var(--is-blue-8)] px-10 md:px-20 py-5 w-[90%] lg:w-[45%]">
                    <img src="../assets/icons/logo.svg" alt="logo" class="w-60 h-20" />
                    <div class="flex gap-3">
                        <a href="login.html"
                            class="text-nowrap text-center hover:before:bg-[var(--is-blue)] bg-[var(--is-blue-3)] text-white px-3 py-[2%] rounded-[8px] btn">
                            <div class="relative z-1 text-sm font-semibold">
                                <span>Login</span>
                            </div>
                        </a>
                        <a href="register.html"
                            class="text-nowrap text-center hover:before:bg-[var(--is-blue)] border-2 border-white text-white px-3 py-[2%] rounded-[8px] btn">
                            <div class="relative z-1 text-sm font-semibold">
                                <span>Sign up</span>
                            </div>
                        </a>
                    </div>
                    <div class="flex flex-col gap-2">
                        <h2 class="font-semibold text-xl md:text-3xl">Login to your account</h2>
                        <p class="font-normal text-base">Log in with the details you used when you registered.</p>
                    </div>
                    <form id="loginForm" action="admin/home.html" method="get" class="flex flex-col gap-4">
                        <input type="email"
                            class="border border-1 border-[var(--is-gray-7)] px-[15px] py-2 w-full placeholder:text-white bg-[var(--is-gray-16)] rounded-[10px]"
                            placeholder="Email address" />
                        <input type="password"
                            class="border border-1 border-[var(--is-gray-7)] px-[15px] py-2 w-full placeholder:text-white bg-[var(--is-gray-16)] rounded-[10px]"
                            placeholder="Password" />
                        <div class="my-5 flex justify-between">
                            <label for="remeber">
                                <input type="checkbox" id="remeber" />
                                Remember me
                            </label>
                            <a href="" class="text-nowrap">Forgot password?</a>
                        </div>
                        <div class="flex justify-center">
                            <button type="submit"
                                class="text-center hover:before:bg-[var(--is-blue)] bg-[var(--is-pink)] text-white rounded-[15px] px-18 py-[3.5%] btn">
                                <div class="relative z-1 text-xs font-semibold">
                                    <span>Sign in</span>
                                </div>
                            </button>
                        </div>

                        <div class="flex justify-center items-center gap-3 text-center">
                            <div class="mt-[3px] w-[40%] relative h-[1.5px]">
                                <div class="absolute left-0 bottom-0 w-full h-full bg-white opacity-[0.5]"></div>
                            </div>
                            <p class="text-nowrap">Or log in with</p>
                            <div class="mt-[3px] w-[40%] relative h-[1.5px]">
                                <div class="absolute left-0 bottom-0 w-full h-full bg-white opacity-[0.5]"></div>
                            </div>
                        </div>

                        <ul class="flex gap-3 justify-center">
                            <li>
                                <a href="" title="google">
                                    <img src="../assets/icons/google-bg-white.svg" alt="google"
                                        class="w-[40px] h-[44px]" />
                                </a>
                            </li>
                            <li>
                                <a href="" title="meta">
                                    <img src="../assets/icons/meta-2.svg" alt="meta" class="w-[40px] h-[44px]" />
                                </a>
                            </li>
                            <li>
                                <a href="" title="apple">
                                    <img src="../assets/icons/apple-1.svg" alt="apple" class="w-[40px] h-[44px]" />
                                </a>
                            </li>
                        </ul>
                    </form>
                </div>
            </div>
        </section>
        <!-- end login -->
    </div>
</body>

<script src="../assets/js/jquery.min.js"></script>
<script src="../assets/js/navbar-layout.js"></script>
<script src="../assets/js/footer-layout.js"></script>
<script src="../assets/js/global.js"></script>

<script>
    const userEmail = "test@gmail.com";
    const userPassword = "Test!123456";

    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const email = document.querySelector('[type="email"]').value;
        const password = document.querySelector('[type="password"]').value;

        if (email === userEmail && password === userPassword) {

            localStorage.setItem(
                "user",
                JSON.stringify({
                    email,
                    name: "Momen"
                })
            );

            window.location.href = "admin/home.html";

        } else {
            alert("Invalid email or password");
        }
    });
</script>

</html>
