<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/logo.svg" />
    <link rel="stylesheet" href="../assets/css/aos.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/output.css">
    <title>Travel Roam Partners</title>
</head>

<body>
    <div id="loadingOverlay" class="fixed inset-0 bg-white flex justify-center items-center z-[9999]">
        <div class="w-16 h-16 border-6 border-gray-200 border-t-[var(--is-blue)] rounded-full animate-spin"></div>
    </div>
    <div id="app" style="display: none;">
        <!-- start navbar -->
        <coop-navbar></coop-navbar>
        <!-- end navbar -->
        <!-- start hero -->
        <main style="background-image: url('../assets/images/bg-contact.png');" class="
    bg-cover
    bg-center
    bg-no-repeat h-[25vh] md:h-[60vh]">
            <div
                class="relative z-1 pt-22 pb-15 md:py-0 h-full bg-gradient-to-r from-[var(--is-blue)] from-30% via-[var(--is-blue)]/60 via-60% to-transparent flex items-center">
                <div class="container">
                    <h1 data-aos="fade-up" class="text-white font-bold text-xl md:text-5xl md:leading-15">Contact
                    </h1>
                </div>
            </div>
        </main>
        <!-- end hero -->
        <!-- start content -->
        <section>
            <div class="container translate-y-[-100px] z-2 relative flex flex-col gap-[30px]">
                <form action="" method="" class="flex flex-col gap-[30px]">
                    <div
                        class="bg-white rounded-[24px] px-40 py-10 shadow-[0_2px_5px_var(--is-black-2)] flex flex-col gap-[20px]">
                        <h3 class="mb-5 text-center text-2xl md:text-[42px] font-normal text-[var(--is-pink)]">Contact
                            <span class="font-semibold text-[var(--is-blue-3)]">TravelRoam</span>
                        </h3>
                        <div class="grid sm:grid-cols-2 gap-[20px]">
                            <label for="" class="flex flex-col gap-6">
                                <span class="text-[var(--is-blue-3)] font-semibold text-xl">Full Name</span>
                                <input type="text"
                                    class="bg-[var(--is-gray-6)] py-3 px-4 rounded-[10px] border border-1 border-[var(--is-gray-7)]"
                                    placeholder="Name" />
                            </label>
                            <label for="" class="relative flex flex-col gap-6">
                                <span class="text-[var(--is-blue-3)] font-semibold text-xl">Query Type</span>
                                <select
                                    onchange="this.nextElementSibling.querySelector('img').classList.toggle('rotate-180', this.matches(':focus'))"
                                    onfocus="this.nextElementSibling.querySelector('img').classList.add('rotate-180')"
                                    onblur="this.nextElementSibling.querySelector('img').classList.remove('rotate-180')"
                                    class="appearance-none w-full text-gray-500 bg-[var(--is-gray-6)] py-3 px-4 pr-10 rounded-[10px] border border-1 border-[var(--is-gray-7)] cursor-pointer">
                                    <option disabled selected value="Select">Select</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select>

                                <div class="absolute bottom-[14px] right-3">
                                    <img src="../assets/icons/arraw-pink.svg" alt="arrow"
                                        class="w-4 h-4 transition-transform duration-300" />
                                </div>

                            </label>
                            <label for="" class="flex flex-col gap-6">
                                <span class="text-[var(--is-blue-3)] font-semibold text-xl">Email Address</span>
                                <input type="email"
                                    class="bg-[var(--is-gray-6)] py-3 px-4 rounded-[10px] border border-1 border-[var(--is-gray-7)]"
                                    placeholder="yourname@email.com" />
                            </label>
                            <label for="" class="relative flex flex-col gap-6">
                                <span class="text-[var(--is-blue-3)] font-semibold text-xl">Platform</span>
                                <select
                                    onchange="this.nextElementSibling.querySelector('img').classList.toggle('rotate-180', this.matches(':focus'))"
                                    onfocus="this.nextElementSibling.querySelector('img').classList.add('rotate-180')"
                                    onblur="this.nextElementSibling.querySelector('img').classList.remove('rotate-180')"
                                    class="appearance-none w-full text-gray-500 bg-[var(--is-gray-6)] py-3 px-4 pr-10 rounded-[10px] border border-1 border-[var(--is-gray-7)] cursor-pointer">
                                    <option disabled selected value="Select">Select</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select>

                                <div class="absolute bottom-[14px] right-3">
                                    <img src="../assets/icons/arraw-pink.svg" alt="arrow"
                                        class="w-4 h-4 transition-transform duration-300" />
                                </div>

                            </label>

                            <label for="" class="flex flex-col gap-6">

                                <span class="text-[var(--is-blue-3)] font-semibold text-xl">Mobile Number</span>

                                <div class="relative dropdown-wrapper">
                                    <div
                                        class="border border-1 border-[var(--is-gray-7)] rounded-xl flex items-center relative">

                                        <img src="/assets/icons/untitled-design.svg" id="flag"
                                            class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 rounded-full" />
                                            
                                        <div class="flex items-center w-full bg-[var(--is-gray-6)] rounded-[10px]">
                                            <div class="flex items-center cursor-pointer"
                                                onclick="openDestinationsByList('destination-list-1')">
                                                <p class="phone-code ps-[40px]">+675</p>
                                                <img src="/assets/icons/down-arrow.svg" alt="down arrow" width="20"
                                                    height="20" />
                                            </div>
                                            <input class="py-3 ms-8 w-full" type="number"
                                                placeholder="(000) 000-0000" />
                                        </div>
                                    </div>
                                    <ul id="destination-list-1"
                                        class="shadow-2xl dropdown-list !block !px-0 absolute w-full mt-3 rounded-[12px] !bg-white overflow-hidden z-50">
                                    </ul>
                                </div>
                            </label>

                            <label for="" class="relative flex flex-col gap-6">

                                <span class="text-[var(--is-blue-3)] font-semibold text-xl">Country of Residence</span>

                                <div class="relative dropdown-wrapper">
                                    <div
                                        class="border border-1 border-[var(--is-gray-7)] rounded-xl flex items-center relative">
                                        <div class="w-full rounded-xl flex items-center relative">
                                            
                                            <img src="/assets/icons/untitled-design.svg" id="flag"
                                                class="rounded-full w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2" />

                                            <div class="flex items-center w-full bg-[var(--is-gray-6)] rounded-[10px]">
                                                <input type="text" class="py-3 ms-10 w-full"
                                                    placeholder="Enter your country" id="destination-input-2"
                                                    oninput="filterDestinations(this.value, this)"
                                                    onfocus="openDestinations(this)" />
                                            </div>
                                        </div>

                                        <ul id="destination-list-2"
                                            class="shadow-2xl dropdown-list !block !px-0 absolute w-full mt-3 rounded-[12px] !bg-white overflow-hidden z-50">
                                        </ul>

                                    </div>
                                </div>
                            </label>

                        </div>
                        <div class="relative flex flex-col gap-[20px]">

                            <span class="text-[var(--is-blue-3)] font-semibold text-xl">Your Message</span>

                            <textarea name="" id="" placeholder="Type Message"
                                class="h-[100px] md:h-[300px] w-full bg-[var(--is-gray-6)] py-3 px-4 rounded-[10px] border border-1 border-[var(--is-gray-7)] resize-none"></textarea>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" class="custom-checkbox" id="checkbox" />
                        <label for="checkbox" class="w-full">I accept the terms and conditions and the treatment
                            of
                            data
                            use.</label>
                    </div>
                    <div class="flex">
                        <input type="submit" value="Send message" title="Send message"
                            class="text-center before:bg-[var(--is-blue)] rounded-[20px] hover:text-white text-white bg-[var(--is-pink)] px-15 py-4 btn" />
                    </div>
                </form>
                <div data-aos="fade-up"
                    class="shadow-xl flex flex-col md:flex-row items-center justfiy-between gap-4 md:gap-0 bg-gradient-to-r from-[var(--is-pink)] to-[var(--is-pink)]/50 px-13 py-7 md:py-3 rounded-[25px]">
                    <div class="w-full">
                        <div class="text-center md:text-start md:w-[42%] flex flex-col gap-5">
                            <h3 class="text-white font-bold text-xl md:text-3xl">Quick question? Check our FAQs</h3>
                            <a href="faq.html" title="Read our FAQs"
                                class="text-center cursor-pointer w-full before:bg-[var(--is-blue)] rounded-[20px] hover:text-white text-[var(--is-pink)] bg-white px-5 py-5 btn">
                                <div class="text-xl relative z-1 font-bold">
                                    <span>Read our FAQs</span>
                                </div>
                            </a>
                        </div>
                    </div>
                    <img src="../assets/images/questions.png" alt="questions"
                        class="w-[203px] h-[185px] object-cover" />
                </div>
            </div>
        </section>
        <!-- end content -->
        <!-- start footer -->
        <coop-footer></coop-footer>
        <!-- end footer -->
    </div>
</body>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="../assets/js/jquery.min.js"></script>
<script src="../assets/js/navbar-layout.js"></script>
<script src="../assets/js/footer-layout.js"></script>
<script src="../assets/js/contact.js"></script>
<script src="../assets/js/global.js"></script>
<script src="../assets/js/faq.js"></script>
<script src="../assets/js/aos.js"></script>

</html>
