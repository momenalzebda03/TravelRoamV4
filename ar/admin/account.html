<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../assets/icons/logo.svg" />
    <link rel="stylesheet" href="../../assets/css/aos.css" />
    <link rel="stylesheet" href="../../assets/css/global.css" />
    <link rel="stylesheet" href="../../assets/css/output.css">
    <title>شركاء السفر والتجوال</title>
</head>

<body>
    <div id="loadingOverlay" class="fixed inset-0 bg-white flex justify-center items-center z-[9999]">
        <div class="w-16 h-16 border-6 border-gray-200 border-t-[var(--is-blue)] rounded-full animate-spin"></div>
    </div>
    <div id="app" style="display: none;">
        <!-- start navbar -->
        <coop-navbar lang="ar"></coop-navbar>
        <!-- end navbar -->
        <div class="shadow-2xl container mt-[140px] bg-[var(--is-white-4)] rounded-[25px] p-[30px]">
            <div class="container grid min-[576px]:grid-cols-[2fr_10fr] gap-[16px] lg:gap-[46px]">
                <coop-sidebar lang="ar"></coop-sidebar>
                <div class="md:me-10 flex flex-col gap-6 mt-[30px]">
                    <div class="flex flex-col gap-2 md:gap-4">
                        <h2 class="text-xl md:text-3xl font-normal">مرحبا بعودتك, <span
                                class="font-semibold">مؤمن!</span></h2>
                        <p class="font-bold text-xl md:text-[42px] text-[var(--is-pink)]">الحساب</p>
                    </div>
                    <form method="" action=""
                        class="mt-5 md:shadow-xl pb-10 py-4 md:px-8 rounded-[18px] flex flex-col gap-4">
                        <h2 class="font-bold text-2xl text-[var(--is-black-13)]">تفاصيلك</h2>
                        <div class="flex flex-col xl:flex-row justify-between gap-5">
                            <div class="grid sm:grid-cols-2 w-full gap-3">
                                <div class="flex flex-col w-full">
                                    <label class="font-normal text-base">الأسم الاول</label>
                                    <input type="text" value="الأسم" class="font-bold border-b-black/30 border-b-2"
                                        id="input" />
                                </div>
                                <div class="flex flex-col w-full">
                                    <label class="font-normal text-base">الأسم الأخير</label>
                                    <input type="text" value="الأسم" class="font-bold border-b-black/30 border-b-2" />
                                </div>
                                <div class="flex flex-col w-full">
                                    <label class="font-normal text-base">عنوان الأيميل</label>
                                    <input type="email" value="yourname@email.com"
                                        class="font-bold border-b-black/30 border-b-2" />
                                </div>
                                <div class="flex flex-col w-full">
                                    <label class="font-normal text-base">رقم الهاتف</label>
                                    <input type="number" value="00000000000"
                                        class="font-bold border-b-black/30 border-b-2" />
                                </div>
                            </div>
                            <div class="flex justify-end w-full xl:w-[60%]">
                                <div class="flex xl:flex-col items-end gap-3 w-full">
                                    <a href="home.html"
                                        class="w-full xl:w-[50%] text-nowrap text-center hover:before:bg-black bg-white hover:text-white text-[var(--is-blue-3)] rounded-[20px] border border-3 border-[var(--is-blue-3)] py-[12px] btn">
                                        <div class="relative z-1 text-sm font-bold">
                                            <span>رجوع</span>
                                        </div>
                                    </a>
                                    <button
                                        class="w-full xl:w-[50%] text-nowrap text-center hover:before:bg-[var(--is-pink)] bg-black text-white rounded-[20px] border border-3 border-[var(--is-blue-3)] py-[12px] btn">
                                        <div class="relative z-1 text-sm font-bold">
                                            <span>ادارة eSIMs</span>
                                        </div>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col gap-4 mt-[45px]">
                            <h2 class="font-bold text-2xl text-[var(--is-black-13)]">عنوانك</h2>
                            <div class="grid sm:grid-cols-2 gap-y-3 sm:gap-y-7 gap-x-10">
                                <div class="flex flex-col">
                                    <label class="font-normal text-base">العنوان الافتراضي</label>
                                    <input type="text" value="العنوان" class="font-bold border-b-black/30 border-b-2" />
                                </div>
                                <div class="relative dropdown-wrapper">
                                    <label class="font-normal text-base">الدولة</label>
                                    <div
                                        class="border opacity-50 md:opacity-100 bg-[var(--bg-gray)] border-white rounded-[20px] flex items-center">
                                        <div class="absolute left-0 top-[24.5px]">
                                            <img id="flag" src="../../assets/icons/usa.svg" alt="search"
                                                class="rounded-full object-cover w-5 h-5" />
                                        </div>
                                        <input type="text" value="Country"
                                            class="w-full font-bold border-b-black/30 border-b-2"
                                            oninput="filterDestinations(this.value, this)"
                                            onfocus="openDestinations(this)" id="destination-input-1" />
                                    </div>

                                    <ul id="destination-list-1"
                                        class="shadow-2xl dropdown-list !block !px-0 absolute w-full mt-2 rounded-[12px] !bg-white overflow-hidden z-50">
                                    </ul>

                                </div>
                                <div class="flex flex-col">
                                    <label class="font-normal text-base">Deena</label>
                                    <input type="text" value="dsad, IN"
                                        class="font-bold border-b-black/30 border-b-2" />
                                </div>
                                <div class="flex flex-col">
                                    <label class="font-normal text-base">Deena</label>
                                    <input type="text" value="Demo, IN"
                                        class="font-bold border-b-black/30 border-b-2" />
                                </div>
                            </div>
                            <div class="flex flex-col xl:flex-row mt-5 gap-[8px]">
                                <button onclick="editAndFocus('input')"
                                    class="flex justify-center items-center gap-3 w-full xl:w-[20%] hover:before:bg-black bg-[var(--is-pink)] text-white rounded-[20px] px-10 py-[13px] btn">
                                    <img src="../../assets/icons/edit.svg" alt="edit" class="relative" />
                                    <div class="relative z-1 text-sm font-semibold">
                                        <span>تحديث</span>
                                    </div>
                                </button>
                                <button
                                    class="w-full xl:w-[20%] text-nowrap text-center hover:before:bg-[var(--is-pink)] bg-black text-white rounded-[20px] py-[13px] btn">
                                    <div class="relative z-1 text-sm font-bold">
                                        <span>تعديل العنوان</span>
                                    </div>
                                </button>
                                <div class="mx-5 flex justify-center items-center gap-2">
                                    <input type="checkbox" class="" id="checkbox" />
                                    <label for="checkbox">تعيين كعنوان افتراضي</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <!-- start footer -->
        <coop-footer lang="ar"></coop-footer>
        <!-- end footer -->
</body>

<script src="../../assets/js/jquery.min.js"></script>
<script src="../../assets/js/navbar-layout.js"></script>
<script src="../../assets/js/footer-layout.js"></script>
<script src="../../assets/js/global.js"></script>
<script src="../../assets/js/sideBar.js"></script>
<script src="../../assets/js/account.js"></script>
<script src="../../assets/js/aos.js"></script>
<script src="../../assets/js/auth.js"></script>

</html>
