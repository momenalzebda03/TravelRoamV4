<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/logo.svg" />
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/output.css">
    <title>شركاء السفر والتجوال</title>
</head>

<body>
    <div id="loadingOverlay" class="fixed inset-0 bg-white flex justify-center items-center z-[9999]">
        <div class="w-16 h-16 border-6 border-gray-200 border-t-[var(--is-blue)] rounded-full animate-spin"></div>
    </div>
    <div id="app" style="display: none;">
        <!-- start navbar -->
        <coop-navbar lang="ar"></coop-navbar>
        <!-- end navbar -->
        <!-- bg-login -->
        <section class="top-0 left-0 pt-40 pb-10 absolute bg-cover
    bg-center
    bg-no-repeat bg-[url('/assets/images/bg-login.png')] w-full h-auto min-h-full">
            <div class="w-full h-full flex justify-center items-center">
                <div
                    class="flex flex-col gap-[23px] text-white rounded-[15px] bg-[var(--is-blue-8)] px-10 md:px-20 py-5 w-[90%] lg:w-[45%]">
                    <img src="../assets/icons/logo.svg" alt="logo" class="w-60 h-20" />
                    <div class="flex gap-3">
                        <a href="login.html"
                            class="text-nowrap text-center hover:before:bg-[var(--is-blue)] bg-[var(--is-pink)] text-white px-3 py-[2%] rounded-[8px] btn">
                            <div class="relative z-1 text-sm font-semibold">
                                <span>تسجيل الدخول</span>
                            </div>
                        </a>
                        <a href="register.html"
                            class="text-nowrap text-center hover:before:bg-[var(--is-blue)] border-2 border-white text-white px-3 py-[2%] rounded-[8px] btn">
                            <div class="relative z-1 text-sm font-semibold">
                                <span>سجّل</span>
                            </div>
                        </a>
                    </div>
                    <div class="flex flex-col gap-2">
                        <h2 class="font-semibold text-xl md:text-3xl">تسجيل الدخول إلى حسابك</h2>
                        <p class="font-normal text-base">سجّل الدخول باستخدام التفاصيل التي استخدمتها عند التسجيل.</p>
                    </div>
                    <form action="admin/home.html" method="get" class="flex flex-col gap-4">

                        <input type="email"
                            class="input-autofill border-1 border-white px-[15px] py-2 w-full placeholder:text-white bg-[var(--is-gray-16)] rounded-[10px]"
                            placeholder="عنوان البريد الإلكتروني" />

                        <div
                            class="relative flex items-center border-1 border-white bg-[var(--is-gray-16)] rounded-[10px]">

                            <input type="password" placeholder="كلمة المرور"
                                class="input-autofill password-input placeholder:text-white w-full px-[15px] py-2 bg-transparent outline-none text-white" />

                            <button type="button" class="toggle-password absolute left-4 flex items-center">
                                <svg class="eye-open h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                <img src="../assets/icons/eye-close.svg" alt="close eye" width="24" height="24"
                                    class="eye-closed h-5 w-5 text-white hidden" />
                            </button>
                        </div>

                        <div class="my-5 flex flex-wrap gap-7 items-center justify-between">

                            <label class="relative flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="remember" class="peer appearance-none w-4 h-4 rounded-[4px] bg-white
               checked:bg-[var(--is-pink)] relative transition-colors" />

                                <svg class="absolute top-[16.6%] inset-0 w-4 h-4 p-[2px] pointer-events-none opacity-0 peer-checked:opacity-100 transition-opacity"
                                    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white"
                                    stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12" />
                                </svg>

                                <span class="text-white">تذكرني</span>
                            </label>
                            
                            <a href="" class="text-nowrap">نسيت كلمة المرور؟</a>
                        </div>
                        <div class="flex justify-center">
                            <button type="submit"
                                class="text-center hover:before:bg-[var(--is-blue)] bg-[var(--is-pink)] text-white rounded-[15px] px-13 py-[15px] btn">
                                <div class="relative z-1 text-sm font-semibold">
                                    <span>تسجيل الدخول</span>
                                </div>
                            </button>
                        </div>

                        <div class="flex justify-center items-center gap-3 text-center">
                            <div class="mt-[3px] w-[40%] relative h-[1.5px]">
                                <div class="absolute left-0 bottom-0 w-full h-full bg-white opacity-[0.5]"></div>
                            </div>
                            <p class="text-nowrap">أو سجل باستخدام</p>
                            <div class="mt-[3px] w-[40%] relative h-[1.5px]">
                                <div class="absolute left-0 bottom-0 w-full h-full bg-white opacity-[0.5]"></div>
                            </div>
                        </div>

                        <ul class="flex gap-3 justify-center">
                            <li>
                                <a href="" title="google">
                                    <img src="../assets/icons/google-bg-white.svg" alt="google"
                                        class="w-[40px] h-[44px]" />
                                </a>
                            </li>
                            <li>
                                <a href="" title="meta">
                                    <img src="../assets/icons/meta-2.svg" alt="meta" class="w-[40px] h-[44px]" />
                                </a>
                            </li>
                            <li>
                                <a href="" title="apple">
                                    <img src="../assets/icons/apple-1.svg" alt="apple" class="w-[40px] h-[44px]" />
                                </a>
                            </li>
                        </ul>
                    </form>
                </div>
            </div>
        </section>
        <!-- end login -->
    </div>
</body>

<script src="../assets/js/jquery.min.js"></script>
<script src="../assets/js/navbar-layout.js"></script>
<script src="../assets/js/footer-layout.js"></script>
<script src="../assets/js/global.js"></script>
<script src="../assets/js/loginAndRegister.js"></script>

<script>
    const userEmail = "test@gmail.com";
    const userPassword = "Test!123456";

    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const email = document.querySelector('[type="email"]').value;
        const password = document.querySelector('[type="password"]').value;

        if (email === userEmail && password === userPassword) {

            localStorage.setItem(
                "user",
                JSON.stringify({
                    email,
                    name: "Momen"
                })
            );

            window.location.href = "admin/home.html";

        } else {
            alert("Invalid email or password");
        }
    });
</script>

</html>
