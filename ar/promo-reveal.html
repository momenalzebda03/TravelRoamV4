<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/logo.svg" />
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/output.css">
    <title>شركاء السفر والتجوال</title>
</head>

<body>
    <div id="loadingOverlay" class="fixed inset-0 bg-white flex justify-center items-center z-[9999]">
        <div class="w-16 h-16 border-6 border-gray-200 border-t-[var(--is-blue)] rounded-full animate-spin"></div>
    </div>
    <div id="app" style="display: none;">
        <!-- start register -->
        <section class="bg-cover
    bg-center
    bg-no-repeat bg-[url('../images/bg-login.png')] w-full h-screen py-10">
            <div class="w-full h-full flex justify-center items-center">
                <div
                    class="mx-5 lg:mx-0 flex flex-col text-center items-center rounded-[15px] bg-[var(--is-blue-8)] px-10 md:px-20 py-5">
                    <div class="flex justify-center">
                        <img src="../assets/icons/logo.svg" alt="logo" class="w-60 h-20" />
                    </div>
                    <div class="lg:w-[790px] flex flex-col gap-[23px]">
                        <div class="text-white flex flex-col gap-4">
                            <h2 class="font-semibold text-xl md:text-3xl">مرحبًا بالعميل, أهلاً بك في TravelRoam</h2>
                            <p class="font-normal text-base"><span class="font-bold">TravelRoam</span> يسعدنا أن نتمكن
                                من تقديم خطة إنترنت حصرية لك لرحلتك القادمة. لا تكاليف تجوال عالية، ولا خدع.</p>
                            <p class="font-normal text-base">للتعرف على خطتك المجانية ببساطة أخبرنا برمزك الترويجي
                                أدناه.</p>
                        </div>
                        <div
                            class="rounded-[6px] bg-white py-[20px] md:py-[70px] px-[50px] md:px-[100px] flex gap-10 flex-wrap justify-between lg:justify-around items-center">
                            <div class="flex items-center gap-2">
                                <img src="../assets/icons/usa.svg" alt="search"
                                    class="w-[39px] h-[39px] object-cover rounded-full" />
                                <p class="text-[var(--is-blue-3)] text-lg font-bold">الولايات المتحدة</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <img src="../assets/icons/map-outline.svg" alt="map" class="w-[52px] h-[52px]" />
                                <p class="text-[var(--is-blue-3)] text-lg font-bold">1 GB</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <img src="../assets/icons/circal.svg" alt="search"
                                    class="w-[35px] h-[35px] object-cover rounded-full" />
                                <p class="text-[var(--is-blue-3)] text-lg font-bold">48 ساعات</p>
                            </div>
                        </div>
                        <div class="flex w-full justify-center">
                            <a href="promo-redeeom.html"
                                class="text-center hover:before:bg-[var(--is-blue)] bg-[var(--is-pink)] text-white rounded-[15px] px-9 py-[15px] btn">
                                <div class="relative z-1 text-sm font-semibold">
                                    <span>استبدال الخطة المجانية</span>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- end register -->
    </div>
</body>

<script src="../assets/js/jquery.min.js"></script>
<script src="../assets/js/navbar-layout.js"></script>
<script src="../assets/js/footer-layout.js"></script>
<script src="../assets/js/global.js"></script>

</html>
